<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            50: '#f0f4f9',
                            100: '#e1e3e1',
                            800: '#1e1f20',
                            900: '#131314',
                        }
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Custom Styles & Scrollbar */
        :root {
            --vh: 1vh;
        }
        body {
            /* Fallback for browsers that do not support dvh */
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            background-color: #f0f4f9;
        }
        html.dark body {
            background-color: #131314;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        html.dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        /* Markdown Styling */
        .markdown-body p { margin-bottom: 1em; }
        .markdown-body pre {
            background-color: #1e293b !important;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1em;
            font-family: monospace;
        }
        .markdown-body code {
            background-color: rgba(100, 116, 139, 0.2);
            padding: 0.2em 0.4em;
            border-radius: 0.25rem;
            font-family: monospace;
            font-size: 0.9em;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
        }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 1em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 1em; }
        .markdown-body a { color: #3b82f6; text-decoration: underline; }

        /* Loader */
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 1.5rem;
            color: #333;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        html.dark #loading {
            background: #131314;
            color: #fff;
        }

        /* Typing indicator */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out;
            fill: currentColor;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-200 antialiased">

    <!-- Loading Screen -->
    <div id="loading">
        <div class="flex flex-col items-center">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            <div>Loading App...</div>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="app" class="flex h-[100dvh] w-full hidden opacity-0 transition-opacity duration-500">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-72 bg-gray-50 dark:bg-gemini-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full lg:translate-x-0 lg:static lg:block transition-transform duration-300 flex flex-col h-full">
            <div class="p-4 flex items-center justify-between border-b border-gray-200 dark:border-gray-700">
                <button onclick="createNewChat()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-full flex items-center justify-center gap-2 transition">
                    <i class="fa-solid fa-plus"></i> New Chat
                </button>
                <button class="lg:hidden ml-2 text-gray-500 p-2" onclick="toggleSidebar()">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-3" id="chat-list">
                <!-- Chat items will be injected here -->
            </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex flex-col gap-2">
                <button onclick="toggleTheme()" class="w-full text-left p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700 flex items-center gap-3">
                    <i id="theme-icon" class="fa-solid fa-moon w-5 text-center"></i>
                    <span id="theme-text">Dark Mode</span>
                </button>
                <button onclick="openSettings()" class="w-full text-left p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700 flex items-center gap-3">
                    <i class="fa-solid fa-gear w-5 text-center"></i> Settings
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-[100dvh] bg-white dark:bg-gemini-900 relative min-w-0">
            <!-- Header -->
            <header class="h-14 flex items-center justify-between px-4 border-b border-gray-200 dark:border-gray-800 flex-shrink-0">
                <div class="flex items-center gap-3">
                    <button class="lg:hidden text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 p-1" onclick="toggleSidebar()">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                    <h1 class="font-semibold text-lg truncate" id="current-chat-title">New Chat</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="openSystemPrompt()" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition tooltip relative" title="System Prompt">
                        <i class="fa-solid fa-brain"></i>
                    </button>
                </div>
            </header>

            <!-- Chat Area -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 pb-32 flex flex-col gap-6">
                <!-- Messages go here -->
                <div class="m-auto text-center text-gray-400 dark:text-gray-500 max-w-md" id="empty-state">
                    <i class="fa-brands fa-space-awesome text-5xl mb-4"></i>
                    <h2 class="text-2xl font-semibold mb-2">How can I help you today?</h2>
                    <p class="text-sm">Start typing below to begin a conversation. Make sure your OpenRouter API key is set in Settings.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white dark:from-gemini-900 dark:via-gemini-900 to-transparent pt-6 pb-4 px-4 md:px-8">
                <div class="max-w-4xl mx-auto relative">
                    <form id="chat-form" class="relative flex items-end shadow-lg rounded-2xl bg-gray-50 dark:bg-gemini-800 border border-gray-200 dark:border-gray-700 overflow-hidden focus-within:ring-1 focus-within:ring-blue-500 transition-shadow">
                        <textarea id="message-input" rows="1" class="w-full max-h-48 py-3.5 pl-4 pr-12 bg-transparent border-none focus:ring-0 resize-none outline-none text-gray-800 dark:text-gray-200" placeholder="Ask anything..." style="min-height: 52px;"></textarea>
                        <button type="submit" id="send-button" class="absolute right-2 bottom-2 p-2 text-gray-400 hover:text-blue-500 disabled:opacity-50 disabled:hover:text-gray-400 transition cursor-pointer">
                            <i class="fa-solid fa-paper-plane text-xl"></i>
                        </button>
                    </form>
                    <div class="text-center mt-2 text-xs text-gray-400 dark:text-gray-500">
                        AI can make mistakes. Verify important information.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gemini-800 rounded-xl shadow-2xl w-full max-w-md flex flex-col overflow-hidden">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h3 class="font-semibold text-lg">Settings</h3>
                <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-800 dark:hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto gap-4 flex flex-col">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded bg-transparent focus:ring-2 focus:ring-blue-500 outline-none" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model Name</label>
                    <input type="text" id="model-input" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded bg-transparent focus:ring-2 focus:ring-blue-500 outline-none" placeholder="deepseek/deepseek-r1:free">
                    <p class="text-xs text-gray-500 mt-1">Default: deepseek/deepseek-r1:free</p>
                </div>
            </div>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex justify-end">
                <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition">Save & Close</button>
            </div>
        </div>
    </div>

    <!-- System Prompt Modal -->
    <div id="system-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gemini-800 rounded-xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h3 class="font-semibold text-lg">System Prompt</h3>
                <button onclick="closeSystemPrompt()" class="text-gray-500 hover:text-gray-800 dark:hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-4 flex-1 flex flex-col gap-2">
                <label class="block text-sm text-gray-500">Define AI behavior (Global). Applies to all new chats.</label>
                <textarea id="system-prompt-input" rows="6" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded bg-transparent focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="You are a helpful assistant..."></textarea>
            </div>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex justify-end">
                <button onclick="saveSystemPrompt()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition">Save</button>
            </div>
        </div>
    </div>

    <!-- Logic Script at the VERY END -->
    <script>
        // --- State Management ---
        const State = {
            settings: {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are a helpful, intelligent assistant. Use Markdown for formatting.',
                theme: 'light'
            },
            chats: [],
            currentChatId: null,
            isGenerating: false
        };

        // --- DOM Elements ---
        const DOM = {
            loading: document.getElementById('loading'),
            app: document.getElementById('app'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebar-overlay'),
            chatList: document.getElementById('chat-list'),
            chatContainer: document.getElementById('chat-container'),
            emptyState: document.getElementById('empty-state'),
            currentChatTitle: document.getElementById('current-chat-title'),
            chatForm: document.getElementById('chat-form'),
            messageInput: document.getElementById('message-input'),
            sendButton: document.getElementById('send-button'),
            
            // Modals
            settingsModal: document.getElementById('settings-modal'),
            apiKeyInput: document.getElementById('api-key-input'),
            modelInput: document.getElementById('model-input'),
            
            systemModal: document.getElementById('system-modal'),
            systemPromptInput: document.getElementById('system-prompt-input'),

            // Theme
            htmlDoc: document.documentElement,
            themeIcon: document.getElementById('theme-icon'),
            themeText: document.getElementById('theme-text')
        };

        // --- Initialization ---
        function init() {
            loadState();
            applyTheme();
            renderChatList();
            
            if (State.chats.length === 0) {
                createNewChat();
            } else {
                selectChat(State.chats[0].id);
            }

            setupEventListeners();

            // Hide loader safely
            setTimeout(() => {
                DOM.loading.style.opacity = '0';
                DOM.app.classList.remove('hidden');
                setTimeout(() => {
                    DOM.loading.style.display = 'none';
                    DOM.app.classList.remove('opacity-0');
                    DOM.app.classList.add('opacity-100');
                }, 300);
            }, 500);
        }

        // --- Persistence ---
        function loadState() {
            try {
                const savedSettings = localStorage.getItem('ai_settings');
                if (savedSettings) State.settings = { ...State.settings, ...JSON.parse(savedSettings) };
                
                const savedChats = localStorage.getItem('ai_chats');
                if (savedChats) State.chats = JSON.parse(savedChats);
            } catch (e) {
                console.error("Failed to load state", e);
            }
        }

        function saveState() {
            try {
                localStorage.setItem('ai_settings', JSON.stringify(State.settings));
                localStorage.setItem('ai_chats', JSON.stringify(State.chats));
            } catch (e) {
                console.error("Failed to save state", e);
            }
        }

        // --- Theme Management ---
        function applyTheme() {
            if (State.settings.theme === 'dark') {
                DOM.htmlDoc.classList.add('dark');
                DOM.themeIcon.className = 'fa-solid fa-sun w-5 text-center';
                DOM.themeText.innerText = 'Light Mode';
            } else {
                DOM.htmlDoc.classList.remove('dark');
                DOM.themeIcon.className = 'fa-solid fa-moon w-5 text-center';
                DOM.themeText.innerText = 'Dark Mode';
            }
        }

        function toggleTheme() {
            State.settings.theme = State.settings.theme === 'dark' ? 'light' : 'dark';
            applyTheme();
            saveState();
        }

        // --- Sidebar & Modals ---
        function toggleSidebar() {
            DOM.sidebar.classList.toggle('-translate-x-full');
            DOM.sidebarOverlay.classList.toggle('hidden');
        }

        function openSettings() {
            DOM.apiKeyInput.value = State.settings.apiKey;
            DOM.modelInput.value = State.settings.model;
            DOM.settingsModal.classList.remove('hidden');
            if(window.innerWidth < 1024) toggleSidebar();
        }
        function closeSettings() { DOM.settingsModal.classList.add('hidden'); }
        function saveSettings() {
            State.settings.apiKey = DOM.apiKeyInput.value.trim();
            State.settings.model = DOM.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
            saveState();
            closeSettings();
        }

        function openSystemPrompt() {
            DOM.systemPromptInput.value = State.settings.systemPrompt;
            DOM.systemModal.classList.remove('hidden');
        }
        function closeSystemPrompt() { DOM.systemModal.classList.add('hidden'); }
        function saveSystemPrompt() {
            State.settings.systemPrompt = DOM.systemPromptInput.value.trim();
            saveState();
            closeSystemPrompt();
        }

        // --- Chat Management ---
        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: 'New Conversation',
                messages: [],
                updatedAt: Date.now()
            };
            State.chats.unshift(newChat);
            saveState();
            renderChatList();
            selectChat(newChat.id);
            if(window.innerWidth < 1024 && !DOM.sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }
            DOM.messageInput.focus();
        }

        function selectChat(id) {
            State.currentChatId = id;
            const chat = State.chats.find(c => c.id === id);
            if (!chat) return;

            DOM.currentChatTitle.innerText = chat.title;
            renderChatList(); // Update active state
            renderMessages();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            if(!confirm("Delete this chat?")) return;
            State.chats = State.chats.filter(c => c.id !== id);
            if (State.currentChatId === id) {
                State.currentChatId = null;
            }
            if (State.chats.length === 0) {
                createNewChat();
            } else if (!State.currentChatId) {
                selectChat(State.chats[0].id);
            } else {
                renderChatList();
            }
            saveState();
        }

        function editChatTitle(id, event) {
            event.stopPropagation();
            const chat = State.chats.find(c => c.id === id);
            if(!chat) return;
            const newTitle = prompt("Enter new title:", chat.title);
            if (newTitle && newTitle.trim() !== "") {
                chat.title = newTitle.trim();
                saveState();
                renderChatList();
                if(State.currentChatId === id) DOM.currentChatTitle.innerText = chat.title;
            }
        }

        // --- Rendering ---
        function renderChatList() {
            DOM.chatList.innerHTML = '';
            State.chats.sort((a,b) => b.updatedAt - a.updatedAt).forEach(chat => {
                const isActive = chat.id === State.currentChatId;
                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-2 rounded cursor-pointer mb-1 group ${isActive ? 'bg-gray-200 dark:bg-gray-700 font-medium' : 'hover:bg-gray-100 dark:hover:bg-gray-700/50'}`;
                div.onclick = () => selectChat(chat.id);
                
                div.innerHTML = `
                    <div class="flex items-center gap-2 overflow-hidden">
                        <i class="fa-regular fa-message text-gray-500 flex-shrink-0"></i>
                        <span class="truncate text-sm">${escapeHTML(chat.title)}</span>
                    </div>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button class="p-1 text-gray-400 hover:text-blue-500" onclick="editChatTitle('${chat.id}', event)" title="Rename">
                            <i class="fa-solid fa-pen text-xs"></i>
                        </button>
                        <button class="p-1 text-gray-400 hover:text-red-500" onclick="deleteChat('${chat.id}', event)" title="Delete">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                    </div>
                `;
                DOM.chatList.appendChild(div);
            });
        }

        function renderMessages() {
            const chat = State.chats.find(c => c.id === State.currentChatId);
            if (!chat) return;

            // Clear container (keep empty state hidden if messages exist)
            DOM.chatContainer.innerHTML = '';
            
            if (chat.messages.length === 0) {
                DOM.chatContainer.appendChild(DOM.emptyState);
                DOM.emptyState.style.display = 'block';
            } else {
                DOM.emptyState.style.display = 'none';
                chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
                scrollToBottom();
            }
        }

        function appendMessageUI(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const inner = document.createElement('div');
            
            if (role === 'user') {
                inner.className = 'bg-blue-100 dark:bg-blue-900/40 text-gray-800 dark:text-gray-100 max-w-[85%] md:max-w-[75%] rounded-2xl p-4 whitespace-pre-wrap leading-relaxed border border-blue-200 dark:border-blue-800/50 shadow-sm';
                inner.innerText = content;
            } else {
                inner.className = 'w-full md:max-w-[85%] text-gray-800 dark:text-gray-200 p-2 md:p-4 leading-relaxed flex gap-4';
                
                const iconContainer = document.createElement('div');
                iconContainer.className = 'w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center flex-shrink-0 shadow-md text-white';
                iconContainer.innerHTML = '<i class="fa-solid fa-sparkles text-xs"></i>';
                
                const contentContainer = document.createElement('div');
                contentContainer.className = 'markdown-body flex-1 overflow-x-auto pt-1';
                contentContainer.innerHTML = marked.parse(content || '');
                
                inner.appendChild(iconContainer);
                inner.appendChild(contentContainer);
            }
            
            wrapper.appendChild(inner);
            DOM.chatContainer.appendChild(wrapper);
            return wrapper; // Return wrapper so we can update it during streaming
        }

        function appendTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.className = `flex w-full justify-start`;
            
            const inner = document.createElement('div');
            inner.className = 'w-full md:max-w-[85%] p-4 flex gap-4 items-center text-gray-400';
            
            const iconContainer = document.createElement('div');
            iconContainer.className = 'w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center flex-shrink-0 opacity-50 text-white';
            iconContainer.innerHTML = '<i class="fa-solid fa-sparkles text-xs"></i>';
            
            const dots = document.createElement('div');
            dots.className = 'flex gap-1 items-center h-full pt-1';
            dots.innerHTML = `
                <svg width="24" height="10" viewBox="0 0 24 10" fill="currentColor">
                    <circle class="typing-dot" cx="4" cy="5" r="3"/>
                    <circle class="typing-dot" cx="12" cy="5" r="3"/>
                    <circle class="typing-dot" cx="20" cy="5" r="3"/>
                </svg>
            `;
            
            inner.appendChild(iconContainer);
            inner.appendChild(dots);
            wrapper.appendChild(inner);
            DOM.chatContainer.appendChild(wrapper);
            scrollToBottom();
            return wrapper;
        }

        // --- Core Interactions ---
        async function handleSend(e) {
            e.preventDefault();
            if (State.isGenerating) return;
            
            const text = DOM.messageInput.value.trim();
            if (!text) return;

            if (!State.settings.apiKey) {
                alert("Please set your OpenRouter API Key in settings first.");
                openSettings();
                return;
            }

            // UI Updates immediately
            DOM.messageInput.value = '';
            DOM.messageInput.style.height = '52px';
            DOM.emptyState.style.display = 'none';
            State.isGenerating = true;
            DOM.sendButton.disabled = true;

            const chat = State.chats.find(c => c.id === State.currentChatId);
            
            // Generate title if it's the first message
            if (chat.messages.length === 0) {
                chat.title = text.length > 30 ? text.substring(0, 30) + '...' : text;
                DOM.currentChatTitle.innerText = chat.title;
            }

            // User Message
            chat.messages.push({ role: 'user', content: text });
            chat.updatedAt = Date.now();
            appendMessageUI('user', text);
            renderChatList();
            saveState();
            scrollToBottom();

            // AI Message Prep
            const typingIndicator = appendTypingIndicator();
            let aiMessageContent = '';
            const aiMessageIndex = chat.messages.length;
            chat.messages.push({ role: 'assistant', content: '' });

            try {
                // Build API History payload
                const apiMessages = [
                    { role: 'system', content: State.settings.systemPrompt },
                    ...chat.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }))
                ];

                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${State.settings.apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Universal Chat UI'
                    },
                    body: JSON.stringify({
                        model: State.settings.model,
                        messages: apiMessages,
                        stream: true
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || `HTTP ${response.status}`);
                }

                // Remove typing indicator, replace with actual message wrapper
                typingIndicator.remove();
                const aiWrapper = appendMessageUI('assistant', '');
                const markdownContainer = aiWrapper.querySelector('.markdown-body');

                // Stream processing
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line in buffer

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed.startsWith('data: ')) {
                            const dataStr = trimmed.substring(6);
                            if (dataStr === '[DONE]') continue;
                            
                            try {
                                const parsed = JSON.parse(dataStr);
                                const token = parsed.choices[0]?.delta?.content;
                                if (token) {
                                    aiMessageContent += token;
                                    // Update UI incrementally (use marked)
                                    markdownContainer.innerHTML = marked.parse(aiMessageContent);
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.warn("Parse error on stream chunk", e);
                            }
                        }
                    }
                }

                // Final save
                chat.messages[aiMessageIndex].content = aiMessageContent;
                chat.updatedAt = Date.now();
                saveState();

            } catch (error) {
                console.error("API Error:", error);
                typingIndicator.remove();
                chat.messages[aiMessageIndex].content = `**Error:** ${error.message}`;
                appendMessageUI('assistant', `**Error:** ${error.message}`);
                saveState();
            } finally {
                State.isGenerating = false;
                DOM.sendButton.disabled = false;
                DOM.messageInput.focus();
            }
        }

        // --- Utils ---
        function setupEventListeners() {
            DOM.chatForm.addEventListener('submit', handleSend);
            
            // Auto-resize textarea and enter-to-send
            DOM.messageInput.addEventListener('input', function() {
                this.style.height = '52px';
                this.style.height = Math.min(this.scrollHeight, 192) + 'px'; // Max height ~48 (192px)
            });

            DOM.messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if(!State.isGenerating) handleSend(e);
                }
            });

            // Close modals on outside click
            window.addEventListener('click', (e) => {
                if(e.target === DOM.settingsModal) closeSettings();
                if(e.target === DOM.systemModal) closeSystemPrompt();
            });
        }

        function scrollToBottom() {
            setTimeout(() => {
                DOM.chatContainer.scrollTop = DOM.chatContainer.scrollHeight;
            }, 50);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        // Boot
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
