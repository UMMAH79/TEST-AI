<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        geminiBg: '#f0f4f9',
                        geminiDarkBg: '#131314',
                        geminiSidebar: '#e3e3e3',
                        geminiDarkSidebar: '#1e1f20',
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Custom Markdown Styles */
        .markdown-body pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.75rem 0; font-size: 0.875rem; }
        .markdown-body code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background: rgba(0,0,0,0.1); padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-size: 0.875em; }
        .dark .markdown-body code { background: rgba(255,255,255,0.1); }
        .markdown-body pre code { background: transparent; padding: 0; }
        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; }
        .markdown-body a { color: #3b82f6; text-decoration: underline; }
        
        /* Thinking blocks (DeepSeek r1 support) */
        .think-block { color: #6b7280; font-style: italic; border-left: 3px solid #d1d5db; padding-left: 1rem; margin: 0.75rem 0; font-size: 0.95em; }
        .dark .think-block { color: #9ca3af; border-left-color: #4b5563; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Mobile fixes */
        html, body { overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }
        
        /* Blinking cursor for streaming */
        .cursor-blink::after { content: '▋'; animation: blink 1s step-start infinite; color: #3b82f6; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-white dark:bg-geminiDarkBg text-gray-800 dark:text-gray-200 transition-colors duration-200">

    <div id="loading" class="fixed inset-0 bg-white dark:bg-geminiDarkBg z-[100] flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
        <div class="text-lg font-medium text-gray-600 dark:text-gray-300">Loading App...</div>
    </div>

    <div id="app" class="flex min-h-[100dvh] relative w-full opacity-0 transition-opacity duration-300">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

        <aside id="sidebar" class="absolute md:relative z-40 w-72 min-h-[100dvh] bg-gray-50 dark:bg-geminiDarkSidebar border-r border-gray-200 dark:border-gray-800 flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex-shrink-0">
            <div class="p-4 flex items-center justify-between">
                <button id="new-chat-btn" class="flex-1 bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700 rounded-full py-2 px-4 flex items-center gap-2 shadow-sm transition-colors duration-200">
                    <i class="fa-solid fa-plus text-blue-500"></i>
                    <span class="font-medium">New Chat</span>
                </button>
                <button id="close-sidebar-btn" class="md:hidden ml-2 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-2 space-y-1" id="chat-list">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800">
                <button id="open-settings-btn" class="w-full text-left p-3 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 flex items-center gap-3 transition-colors duration-200">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-geminiDarkBg relative">
            
            <header class="h-14 flex items-center justify-between px-4 sticky top-0 bg-white/80 dark:bg-geminiDarkBg/80 backdrop-blur-md z-20">
                <div class="flex items-center gap-3 w-full">
                    <button id="menu-btn" class="md:hidden p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                        <i class="fa-solid fa-bars text-lg"></i>
                    </button>
                    <h1 id="current-chat-title" class="text-lg font-semibold truncate flex-1">New Chat</h1>
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                        <i class="fa-solid fa-moon dark:hidden"></i>
                        <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
                    </button>
                </div>
            </header>

            <div id="messages-container" class="flex-1 overflow-y-auto p-4 md:px-12 lg:px-24 scroll-smooth">
                <div id="messages-inner" class="max-w-3xl mx-auto space-y-6 pb-4">
                    </div>
            </div>

            <div class="p-4 bg-white dark:bg-geminiDarkBg">
                <div class="max-w-3xl mx-auto relative rounded-3xl bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus-within:ring-1 focus-within:ring-gray-300 dark:focus-within:ring-gray-600 transition-all shadow-sm">
                    <textarea id="chat-input" rows="1" class="w-full bg-transparent border-none focus:ring-0 resize-none py-4 pl-5 pr-14 max-h-48 rounded-3xl text-gray-800 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400" placeholder="Type a message... (Shift+Enter for new line)"></textarea>
                    <button id="send-btn" class="absolute right-2 bottom-2 p-2 rounded-full bg-blue-500 hover:bg-blue-600 text-white disabled:opacity-50 disabled:cursor-not-allowed transition-colors h-10 w-10 flex items-center justify-center">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <div class="text-xs text-center text-gray-400 mt-2">
                    AI can make mistakes. Verify important information.
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 rounded-2xl w-full max-w-md shadow-2xl transform transition-transform scale-95 opacity-0" id="settings-modal-content">
            <div class="p-6">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-200 dark:border-gray-700 pb-2">Settings</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">OpenRouter API Key <span class="text-red-500">*</span></label>
                        <input type="password" id="api-key-input" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="sk-or-v1-...">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Model</label>
                        <input type="text" id="model-input" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="e.g. deepseek/deepseek-r1:free">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">System Prompt</label>
                        <textarea id="system-prompt-input" rows="3" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none" placeholder="You are a helpful AI assistant..."></textarea>
                    </div>
                </div>

                <div class="mt-6 flex justify-end gap-3">
                    <button id="cancel-settings-btn" class="px-4 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Cancel</button>
                    <button id="save-settings-btn" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white transition-colors">Save & Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ==========================================
            // STATE MANAGEMENT
            // ==========================================
            const defaultModel = 'deepseek/deepseek-r1:free';
            
            let state = {
                chats: [],
                currentChatId: null,
                settings: {
                    apiKey: '',
                    model: defaultModel,
                    systemPrompt: '',
                    theme: 'system'
                },
                isGenerating: false,
                abortController: null
            };

            // ==========================================
            // DOM ELEMENTS
            // ==========================================
            const els = {
                app: document.getElementById('app'),
                loading: document.getElementById('loading'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebar-overlay'),
                chatList: document.getElementById('chat-list'),
                messagesContainer: document.getElementById('messages-container'),
                messagesInner: document.getElementById('messages-inner'),
                chatInput: document.getElementById('chat-input'),
                sendBtn: document.getElementById('send-btn'),
                newChatBtn: document.getElementById('new-chat-btn'),
                menuBtn: document.getElementById('menu-btn'),
                closeSidebarBtn: document.getElementById('close-sidebar-btn'),
                themeToggle: document.getElementById('theme-toggle'),
                currentChatTitle: document.getElementById('current-chat-title'),
                
                // Settings
                settingsModal: document.getElementById('settings-modal'),
                settingsContent: document.getElementById('settings-modal-content'),
                openSettingsBtn: document.getElementById('open-settings-btn'),
                cancelSettingsBtn: document.getElementById('cancel-settings-btn'),
                saveSettingsBtn: document.getElementById('save-settings-btn'),
                apiKeyInput: document.getElementById('apiKeyInput') || document.getElementById('api-key-input'),
                modelInput: document.getElementById('modelInput') || document.getElementById('model-input'),
                systemPromptInput: document.getElementById('systemPromptInput') || document.getElementById('system-prompt-input'),
            };

            // ==========================================
            // INITIALIZATION
            // ==========================================
            function init() {
                loadState();
                applyTheme();
                
                if (state.chats.length === 0) {
                    createNewChat();
                } else if (!state.chats.find(c => c.id === state.currentChatId)) {
                    state.currentChatId = state.chats[0].id;
                }

                renderChatList();
                renderMessages();
                setupEventListeners();

                // Auto-resize textarea
                els.chatInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight < 200 ? this.scrollHeight : 200) + 'px';
                });

                // Remove loading screen
                setTimeout(() => {
                    els.loading.style.display = 'none';
                    els.app.classList.remove('opacity-0');
                    els.chatInput.focus();
                }, 300);
            }

            function loadState() {
                try {
                    const savedChats = localStorage.getItem('universal_ai_chats');
                    if (savedChats) state.chats = JSON.parse(savedChats);
                    
                    const savedChatId = localStorage.getItem('universal_ai_current_chat');
                    if (savedChatId) state.currentChatId = savedChatId;

                    const savedSettings = localStorage.getItem('universal_ai_settings');
                    if (savedSettings) {
                        const parsed = JSON.parse(savedSettings);
                        state.settings = { ...state.settings, ...parsed };
                    }
                } catch (e) {
                    console.error("Failed to load local storage:", e);
                }
            }

            function saveState() {
                try {
                    localStorage.setItem('universal_ai_chats', JSON.stringify(state.chats));
                    localStorage.setItem('universal_ai_current_chat', state.currentChatId);
                    localStorage.setItem('universal_ai_settings', JSON.stringify(state.settings));
                } catch (e) {
                    console.error("Failed to save local storage:", e);
                }
            }

            // ==========================================
            // THEME LOGIC
            // ==========================================
            function applyTheme() {
                const isDark = state.settings.theme === 'dark' || 
                    (state.settings.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }

            function toggleTheme() {
                const isDark = document.documentElement.classList.contains('dark');
                state.settings.theme = isDark ? 'light' : 'dark';
                applyTheme();
                saveState();
            }

            // ==========================================
            // CHAT MANAGEMENT
            // ==========================================
            function createNewChat() {
                const newChat = {
                    id: Date.now().toString(),
                    title: 'New Chat',
                    messages: [],
                    createdAt: Date.now()
                };
                state.chats.unshift(newChat);
                state.currentChatId = newChat.id;
                saveState();
                renderChatList();
                renderMessages();
                closeSidebarMobile();
            }

            function selectChat(id) {
                if (state.isGenerating) return; // Prevent switching while generating
                state.currentChatId = id;
                saveState();
                renderChatList();
                renderMessages();
                closeSidebarMobile();
            }

            function deleteChat(id, event) {
                event.stopPropagation();
                if (state.isGenerating) return;

                if (confirm('Are you sure you want to delete this chat?')) {
                    state.chats = state.chats.filter(c => c.id !== id);
                    if (state.chats.length === 0) {
                        createNewChat();
                    } else if (state.currentChatId === id) {
                        state.currentChatId = state.chats[0].id;
                    }
                    saveState();
                    renderChatList();
                    renderMessages();
                }
            }

            function renameChat(id, event) {
                event.stopPropagation();
                const chat = state.chats.find(c => c.id === id);
                if (!chat) return;
                
                const newTitle = prompt('Rename chat:', chat.title);
                if (newTitle && newTitle.trim() !== '') {
                    chat.title = newTitle.trim();
                    saveState();
                    renderChatList();
                    if(state.currentChatId === id) updateHeaderTitle();
                }
            }

            // ==========================================
            // RENDERING
            // ==========================================
            function renderChatList() {
                els.chatList.innerHTML = '';
                state.chats.forEach(chat => {
                    const isActive = chat.id === state.currentChatId;
                    const item = document.createElement('div');
                    item.className = `group flex items-center justify-between p-3 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 font-medium' : 'hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'}`;
                    
                    item.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden flex-1" onclick="selectChat('${chat.id}')">
                            <i class="fa-regular fa-message"></i>
                            <span class="truncate">${DOMPurify.sanitize(chat.title)}</span>
                        </div>
                        <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity md:ml-2">
                            <button onclick="renameChat('${chat.id}', event)" class="p-1.5 rounded hover:bg-black/10 dark:hover:bg-white/10 text-gray-500" title="Rename"><i class="fa-solid fa-pen text-xs"></i></button>
                            <button onclick="deleteChat('${chat.id}', event)" class="p-1.5 rounded hover:bg-red-500/20 text-red-500" title="Delete"><i class="fa-solid fa-trash text-xs"></i></button>
                        </div>
                    `;
                    els.chatList.appendChild(item);
                });
            }

            function updateHeaderTitle() {
                const currentChat = state.chats.find(c => c.id === state.currentChatId);
                if (currentChat) els.currentChatTitle.textContent = currentChat.title;
            }

            function formatContent(text) {
                // Pre-process <think> tags for DeepSeek
                let processedText = text.replace(/<think>([\s\S]*?)<\/think>/gi, '<div class="think-block"><strong>Reasoning:</strong><br>$1</div>');
                // Open <think> tag that hasn't been closed yet (for streaming)
                processedText = processedText.replace(/<think>([\s\S]*)$/gi, '<div class="think-block"><strong>Reasoning:</strong><br>$1</div>');

                return DOMPurify.sanitize(marked.parse(processedText));
            }

            function renderMessages() {
                updateHeaderTitle();
                els.messagesInner.innerHTML = '';
                const currentChat = state.chats.find(c => c.id === state.currentChatId);
                
                if (!currentChat || currentChat.messages.length === 0) {
                    els.messagesInner.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-center mt-20 opacity-60">
                            <i class="fa-solid fa-wand-magic-sparkles text-4xl mb-4"></i>
                            <h2 class="text-2xl font-semibold">How can I help you today?</h2>
                        </div>
                    `;
                    return;
                }

                currentChat.messages.forEach(msg => {
                    appendMessageNode(msg.role, msg.content, false);
                });
                scrollToBottom();
            }

            function appendMessageNode(role, content, isStreaming = false) {
                const wrapper = document.createElement('div');
                wrapper.className = `flex gap-4 w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
                
                const bubble = document.createElement('div');
                
                if (role === 'user') {
                    bubble.className = 'max-w-[85%] rounded-3xl rounded-tr-sm bg-blue-100 dark:bg-blue-900/40 text-gray-900 dark:text-gray-100 px-5 py-3 whitespace-pre-wrap';
                    bubble.textContent = content; // User text is raw
                } else {
                    bubble.className = `max-w-[100%] md:max-w-[85%] rounded-3xl rounded-tl-sm bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 px-5 py-4 markdown-body text-gray-900 dark:text-gray-200 ${isStreaming ? 'cursor-blink' : ''}`;
                    bubble.innerHTML = formatContent(content);
                }

                wrapper.appendChild(bubble);
                els.messagesInner.appendChild(wrapper);
                return bubble; // Return node so we can update it during stream
            }

            function scrollToBottom() {
                els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight;
            }

            // ==========================================
            // API LOGIC & STREAMING
            // ==========================================
            async function handleSend() {
                if (state.isGenerating) {
                    // Abort generation
                    if (state.abortController) {
                        state.abortController.abort();
                        state.isGenerating = false;
                        updateInputState();
                    }
                    return;
                }

                const text = els.chatInput.value.trim();
                if (!text) return;

                if (!state.settings.apiKey) {
                    alert('Please configure your OpenRouter API Key in settings.');
                    openSettings();
                    return;
                }

                const currentChat = state.chats.find(c => c.id === state.currentChatId);
                if (!currentChat) return;

                // Auto-generate title for first message
                if (currentChat.messages.length === 0) {
                    currentChat.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
                    renderChatList();
                    updateHeaderTitle();
                }

                // Add User Message
                currentChat.messages.push({ role: 'user', content: text });
                els.chatInput.value = '';
                els.chatInput.style.height = 'auto'; // reset height
                renderMessages();
                
                // Add Empty Assistant Message placeholder
                state.isGenerating = true;
                updateInputState();
                state.abortController = new AbortController();

                let aiMessageContent = '';
                const bubbleNode = appendMessageNode('assistant', '', true);
                scrollToBottom();

                // Prepare Payload
                const apiMessages = [...currentChat.messages];
                if (state.settings.systemPrompt) {
                    apiMessages.unshift({ role: 'system', content: state.settings.systemPrompt });
                }

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${state.settings.apiKey}`,
                            'Content-Type': 'application/json',
                            'HTTP-Referer': window.location.href, // Recommended by OpenRouter
                            'X-Title': 'Universal AI Chat'
                        },
                        body: JSON.stringify({
                            model: state.settings.model || defaultModel,
                            messages: apiMessages,
                            stream: true
                        }),
                        signal: state.abortController.signal
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || 'API request failed');
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); // keep incomplete line
                        
                        for (let line of lines) {
                            if (line.trim() === '') continue;
                            if (line.startsWith('data: ')) {
                                const dataStr = line.slice(6).trim();
                                if (dataStr === '[DONE]') continue;
                                
                                try {
                                    const data = JSON.parse(dataStr);
                                    const token = data.choices[0]?.delta?.content || '';
                                    if (token) {
                                        aiMessageContent += token;
                                        // Throttle rendering slightly for performance if needed, but innerHTML is fast enough for chat
                                        bubbleNode.innerHTML = formatContent(aiMessageContent);
                                        scrollToBottom();
                                    }
                                } catch (e) {
                                    console.warn('Error parsing stream chunk:', e, 'Line:', line);
                                }
                            }
                        }
                    }

                } catch (err) {
                    if (err.name === 'AbortError') {
                        aiMessageContent += '\n\n*(Generation stopped)*';
                    } else {
                        aiMessageContent += `\n\n**Error:** ${err.message}`;
                    }
                    bubbleNode.innerHTML = formatContent(aiMessageContent);
                } finally {
                    bubbleNode.classList.remove('cursor-blink');
                    currentChat.messages.push({ role: 'assistant', content: aiMessageContent });
                    state.isGenerating = false;
                    state.abortController = null;
                    saveState();
                    updateInputState();
                    scrollToBottom();
                    
                    // Re-render blocks to ensure proper code highlighting/layout
                    bubbleNode.innerHTML = formatContent(aiMessageContent);
                }
            }

            function updateInputState() {
                if (state.isGenerating) {
                    els.sendBtn.innerHTML = '<i class="fa-solid fa-stop text-red-500"></i>';
                    els.sendBtn.classList.remove('bg-blue-500', 'text-white');
                    els.sendBtn.classList.add('bg-transparent', 'hover:bg-gray-200', 'dark:hover:bg-gray-700');
                } else {
                    els.sendBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
                    els.sendBtn.classList.remove('bg-transparent', 'hover:bg-gray-200', 'dark:hover:bg-gray-700');
                    els.sendBtn.classList.add('bg-blue-500', 'text-white');
                }
            }

            // ==========================================
            // UI INTERACTIONS & EVENTS
            // ==========================================
            function toggleSidebar() {
                const isClosed = els.sidebar.classList.contains('-translate-x-full');
                if (isClosed) {
                    els.sidebar.classList.remove('-translate-x-full');
                    els.sidebarOverlay.classList.remove('hidden');
                } else {
                    closeSidebarMobile();
                }
            }

            function closeSidebarMobile() {
                els.sidebar.classList.add('-translate-x-full');
                els.sidebarOverlay.classList.add('hidden');
            }

            function openSettings() {
                els.apiKeyInput.value = state.settings.apiKey;
                els.modelInput.value = state.settings.model || defaultModel;
                els.systemPromptInput.value = state.settings.systemPrompt;
                
                els.settingsModal.classList.remove('hidden');
                setTimeout(() => {
                    els.settingsContent.classList.remove('scale-95', 'opacity-0');
                }, 10);
            }

            function closeSettings() {
                els.settingsContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    els.settingsModal.classList.add('hidden');
                }, 200);
            }

            function saveSettingsConfig() {
                state.settings.apiKey = els.apiKeyInput.value.trim();
                state.settings.model = els.modelInput.value.trim() || defaultModel;
                state.settings.systemPrompt = els.systemPromptInput.value.trim();
                saveState();
                closeSettings();
            }

            function setupEventListeners() {
                // Header & Sidebar
                els.themeToggle.addEventListener('click', toggleTheme);
                els.menuBtn.addEventListener('click', toggleSidebar);
                els.sidebarOverlay.addEventListener('click', closeSidebarMobile);
                els.closeSidebarBtn.addEventListener('click', closeSidebarMobile);
                els.newChatBtn.addEventListener('click', createNewChat);

                // Settings
                els.openSettingsBtn.addEventListener('click', openSettings);
                els.cancelSettingsBtn.addEventListener('click', closeSettings);
                els.saveSettingsBtn.addEventListener('click', saveSettingsConfig);

                // Message Sending
                els.sendBtn.addEventListener('click', handleSend);
                
                els.chatInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSend();
                    }
                });

                // Window Resize handling for mobile sidebar
                window.addEventListener('resize', () => {
                    if (window.innerWidth >= 768) {
                        els.sidebarOverlay.classList.add('hidden');
                        els.sidebar.classList.remove('-translate-x-full');
                    } else {
                        els.sidebar.classList.add('-translate-x-full');
                    }
                });
            }

            // Global functions required for inline HTML event handlers (Chat List)
            window.selectChat = selectChat;
            window.deleteChat = deleteChat;
            window.renameChat = renameChat;

            // Start App
            init();
        });
    </script>
</body>
</html>
